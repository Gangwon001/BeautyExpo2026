<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뷰티박람회 2026 — 참가기업</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #e91e8c;
      --rose:   #ff6eb4;
      --dark:   #1a1a2e;
      --card-bg:#ffffff;
      --gray:   #f5f5f7;
      --text:   #2c2c2c;
      --muted:  #777;
    }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--gray);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--dark) 0%, #16213e 60%, #0f3460 100%);
      color: #fff;
      text-align: center;
      padding: 60px 20px 50px;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(233,30,140,0.25) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 50%, rgba(255,110,180,0.15) 0%, transparent 60%);
    }
    header > * { position: relative; }
    .header-badge {
      display: inline-block;
      background: rgba(233,30,140,0.2);
      border: 1px solid rgba(233,30,140,0.5);
      color: var(--rose);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 18px;
    }
    header h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }
    header h1 span { color: var(--rose); }
    header p {
      margin-top: 14px;
      font-size: 1.05rem;
      color: rgba(255,255,255,0.65);
      max-width: 500px;
      margin-inline: auto;
      line-height: 1.6;
    }
    .header-meta {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 28px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
    }
    .header-meta strong { color: rgba(255,255,255,0.85); }

    /* ── Section title ── */
    .section-title {
      text-align: center;
      padding: 48px 20px 12px;
    }
    .section-title h2 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .section-title h2 span { color: var(--pink); }
    .section-title p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 32px auto 64px;
      padding: 0 24px;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 36px rgba(233,30,140,0.15);
    }
    .card-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: linear-gradient(135deg, #fce4ec, #f8bbd0);
    }
    .card-img-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      gap: 8px;
    }
    .card-img-placeholder span {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      opacity: 0.55;
    }
    .card-body { padding: 20px; }
    .card-category {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 6px;
    }
    .card-name {
      font-size: 1.18rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 0.87rem;
      color: var(--muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      padding: 0 20px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 0.72rem;
      font-weight: 600;
      background: #fce4ec;
      color: var(--pink);
      padding: 3px 10px;
      border-radius: 100px;
    }
    .card-arrow {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--pink);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .card:hover .card-arrow { background: #c2185b; }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: #fff;
      border-radius: 22px;
      max-width: 640px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,0.22);
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.94) translateY(12px); }
      to   { opacity: 1; transform: none; }
    }
    .modal-hero {
      width: 100%;
      aspect-ratio: 16/7;
      object-fit: cover;
      border-radius: 22px 22px 0 0;
      display: block;
    }
    .modal-hero-placeholder {
      width: 100%;
      aspect-ratio: 16/7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      border-radius: 22px 22px 0 0;
    }
    .modal-content { padding: 28px 32px 32px; }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .modal-title-wrap {}
    .modal-category {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 4px;
    }
    .modal-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; }
    .modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.4rem; color: var(--muted);
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .modal-close:hover { background: #f5f5f5; }
    .modal-divider { height: 1px; background: #f0f0f0; margin: 20px 0; }
    .modal-desc { font-size: 0.96rem; line-height: 1.75; color: #444; }
    .modal-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }
    .info-item { background: var(--gray); border-radius: 12px; padding: 14px 16px; }
    .info-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .info-value { font-size: 0.92rem; font-weight: 600; }
    .modal-products { margin-top: 22px; }
    .modal-products h4 { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .product-list { display: flex; gap: 8px; flex-wrap: wrap; }
    .product-chip {
      font-size: 0.82rem;
      font-weight: 500;
      background: #fce4ec;
      color: #ad1457;
      padding: 6px 14px;
      border-radius: 100px;
    }
    .modal-cta {
      margin-top: 24px;
      display: flex; gap: 10px;
    }
    .btn {
      flex: 1;
      padding: 13px 20px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: var(--pink); color: #fff; }
    .btn-secondary { background: var(--gray); color: var(--text); }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 28px 20px;
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid #e8e8e8;
    }

    @media (max-width: 600px) {
      .modal-content { padding: 20px; }
      .modal-info-grid { grid-template-columns: 1fr; }
      .modal-cta { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-badge">Beauty Expo 2026</div>
  <h1>뷰티박람회<br /><span>참가기업 소개</span></h1>
  <p>국내외 뷰티 산업을 이끄는 6개 혁신 기업을 만나보세요.</p>
  <div class="header-meta">
    <div><strong>2026.09.10 – 12</strong> 일정</div>
    <div><strong>COEX Hall A</strong> 장소</div>
    <div><strong>6개사</strong> 참가</div>
  </div>
</header>

<div class="section-title">
  <h2>참가 <span>기업</span></h2>
  <p>기업 카드를 클릭하면 자세한 정보를 확인할 수 있습니다.</p>
</div>

<div class="grid" id="grid"></div>

<footer>© 2026 Beauty Expo. All rights reserved.</footer>

<!-- Modal -->
<div class="modal-overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-hero-placeholder" id="modal-hero-ph"></div>
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <div class="modal-category" id="modal-cat"></div>
          <div class="modal-title" id="modal-title"></div>
        </div>
        <button class="modal-close" onclick="closeModalBtn()">✕</button>
      </div>
      <div class="modal-divider"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-info-grid" id="modal-info"></div>
      <div class="modal-products">
        <h4>주요 제품 / 서비스</h4>
        <div class="product-list" id="modal-products"></div>
      </div>
      <div class="modal-cta">
        <button class="btn btn-primary" id="modal-website">공식 웹사이트 방문</button>
        <button class="btn btn-secondary" onclick="closeModalBtn()">닫기</button>
      </div>
    </div>
  </div>
</div>

<script>
  const companies = [
    {
      id: 1,
      emoji: "💄",
      color: ["#fce4ec","#f48fb1"],
      category: "스킨케어",
      name: "기업명 A",
      shortDesc: "피부 과학과 자연 성분이 만나는 프리미엄 스킨케어 브랜드.",
      fullDesc: "기업명 A는 첨단 피부 과학과 자연 유래 성분을 융합하여 효과적이고 안전한 스킨케어 솔루션을 제공합니다. 20년의 연구 개발 역량을 바탕으로 국내외 소비자에게 신뢰받는 뷰티 브랜드로 성장해 왔습니다.",
      founded: "2004년",
      employees: "250명",
      booth: "A-101",
      website: "#",
      tags: ["스킨케어", "더마"],
      products: ["수분 크림", "세럼 라인", "선크림 SPF50+", "클렌징 폼"],
    },
    {
      id: 2,
      emoji: "✨",
      color: ["#f3e5f5","#ce93d8"],
      category: "색조화장품",
      name: "기업명 B",
      shortDesc: "감각적인 컬러와 지속력으로 주목받는 색조 전문 브랜드.",
      fullDesc: "기업명 B는 트렌디한 컬러 팔레트와 높은 지속력을 자랑하는 색조 화장품 전문 기업입니다. 매 시즌 글로벌 뷰티 트렌드를 반영한 신제품을 출시하며, SNS 뷰티 인플루언서들 사이에서 폭발적인 인기를 얻고 있습니다.",
      founded: "2012년",
      employees: "120명",
      booth: "A-102",
      website: "#",
      tags: ["색조", "립", "아이"],
      products: ["립스틱 컬렉션", "아이섀도 팔레트", "파운데이션", "블러셔"],
    },
    {
      id: 3,
      emoji: "🌿",
      color: ["#e8f5e9","#a5d6a7"],
      category: "클린뷰티",
      name: "기업명 C",
      shortDesc: "환경과 피부 모두를 생각하는 지속가능 클린뷰티 기업.",
      fullDesc: "기업명 C는 유해 성분 없는 클린 포뮬러와 친환경 패키징으로 지속가능한 뷰티를 실천합니다. 전 제품 비건 인증을 획득하였으며, 탄소 중립 목표 달성을 위한 그린 뷰티 캠페인을 적극 운영하고 있습니다.",
      founded: "2018년",
      employees: "80명",
      booth: "A-103",
      website: "#",
      tags: ["비건", "클린", "친환경"],
      products: ["비건 스킨케어", "그린 클렌저", "리필 패키징", "오가닉 오일"],
    },
    {
      id: 4,
      emoji: "💇",
      color: ["#e3f2fd","#90caf9"],
      category: "헤어케어",
      name: "기업명 D",
      shortDesc: "두피 건강부터 모발 관리까지 전문 헤어케어 솔루션.",
      fullDesc: "기업명 D는 두피 마이크로바이옴 연구를 기반으로 한 전문 헤어케어 브랜드입니다. 탈모 예방부터 손상 모발 복구까지 과학적인 접근법으로 고객의 헤어 고민을 해결하며, 전국 500개 이상의 헤어살롱과 파트너십을 맺고 있습니다.",
      founded: "2009년",
      employees: "190명",
      booth: "A-104",
      website: "#",
      tags: ["헤어", "두피", "탈모"],
      products: ["두피 세럼", "샴푸 라인", "트리트먼트", "헤어팩"],
    },
    {
      id: 5,
      emoji: "🔬",
      color: ["#fff3e0","#ffcc80"],
      category: "뷰티테크",
      name: "기업명 E",
      shortDesc: "AI와 바이오 기술로 개인 맞춤 뷰티를 혁신하는 기업.",
      fullDesc: "기업명 E는 인공지능 피부 분석 기술과 바이오 원료 연구를 결합한 차세대 뷰티테크 기업입니다. 스마트폰 카메라로 피부 상태를 분석하고 개인 맞춤 솔루션을 제공하는 AI 뷰티 앱과 함께 맞춤형 화장품 제조 서비스를 운영합니다.",
      founded: "2020년",
      employees: "65명",
      booth: "A-105",
      website: "#",
      tags: ["AI", "맞춤형", "바이오"],
      products: ["AI 피부 분석 앱", "맞춤형 세럼", "스마트 디바이스", "구독 서비스"],
    },
    {
      id: 6,
      emoji: "🏺",
      color: ["#fafafa","#e0e0e0"],
      category: "한방뷰티",
      name: "기업명 F",
      shortDesc: "천년의 한방 지혜를 현대 뷰티 과학으로 재해석한 브랜드.",
      fullDesc: "기업명 F는 한국 전통 한방 성분과 현대 뷰티 기술을 융합하여 독창적인 제품 라인을 선보입니다. 인삼, 백복령, 당귀 등 엄선된 한방 원료를 활용한 프리미엄 라인은 국내외 소비자에게 한국 뷰티의 우수성을 알리고 있습니다.",
      founded: "1998년",
      employees: "310명",
      booth: "A-106",
      website: "#",
      tags: ["한방", "프리미엄", "K-뷰티"],
      products: ["인삼 에센스", "한방 크림", "발효 토너", "한방 마스크팩"],
    },
  ];

  function buildCards() {
    const grid = document.getElementById('grid');
    companies.forEach(c => {
      grid.innerHTML += `
        <div class="card" onclick="openModal(${c.id})">
          <div class="card-img-placeholder" style="background:linear-gradient(135deg,${c.color[0]},${c.color[1]})">
            <span style="font-size:3.2rem">${c.emoji}</span>
            <span>${c.name}</span>
          </div>
          <div class="card-body">
            <div class="card-category">${c.category}</div>
            <div class="card-name">${c.name}</div>
            <div class="card-desc">${c.shortDesc}</div>
          </div>
          <div class="card-footer">
            <div class="card-tags">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
            <div class="card-arrow">→</div>
          </div>
        </div>`;
    });
  }

  function openModal(id) {
    const c = companies.find(x => x.id === id);
    document.getElementById('modal-hero-ph').style.background = `linear-gradient(135deg,${c.color[0]},${c.color[1]})`;
    document.getElementById('modal-hero-ph').textContent = c.emoji;
    document.getElementById('modal-cat').textContent = c.category;
    document.getElementById('modal-title').textContent = c.name;
    document.getElementById('modal-desc').textContent = c.fullDesc;
    document.getElementById('modal-info').innerHTML = `
      <div class="info-item"><div class="info-label">설립연도</div><div class="info-value">${c.founded}</div></div>
      <div class="info-item"><div class="info-label">임직원 수</div><div class="info-value">${c.employees}</div></div>
      <div class="info-item"><div class="info-label">부스 번호</div><div class="info-value">${c.booth}</div></div>
      <div class="info-item"><div class="info-label">분야</div><div class="info-value">${c.category}</div></div>
    `;
    document.getElementById('modal-products').innerHTML = c.products.map(p=>`<span class="product-chip">${p}</span>`).join('');
    document.getElementById('modal-website').onclick = () => window.open(c.website, '_blank');
    document.getElementById('overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(e) {
    if (e.target === document.getElementById('overlay')) closeModalBtn();
  }
  function closeModalBtn() {
    document.getElementById('overlay').classList.remove('active');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalBtn(); });

  buildCards();
</script>
</body>
</html>
